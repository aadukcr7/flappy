<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Bird - Web</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <h1>Flappy Bird</h1>
    <p class="subtitle">Press Space or click/tap to flap</p>

    <section class="game-wrap" aria-label="Flappy Bird game area">
      <canvas id="game" width="400" height="600" aria-label="Flappy Bird canvas"></canvas>
      <div id="overlay" class="overlay">Click or press Space to start</div>
    </section>

    <p class="score">Score: <span id="score">0</span></p>
  </main>

  <script src="game.js"></script>
</body>
</html>
